<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0" stop-color="#ff6b00" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ff6b00" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#222" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <text x="80" y="310" fill="#f5f1e8" font-family="Archivo Black, Arial Black, sans-serif" font-size="180" font-weight="900" letter-spacing="-6">
    O<tspan fill="#ff6b00">CTANE</tspan>
  </text>
  <text x="80" y="380" fill="#ffb800" font-family="Georgia, serif" font-size="64" font-style="italic">
    Le plein. Le moins cher.
  </text>
  <text x="80" y="545" fill="#8a8278" font-family="Courier New, monospace" font-size="26" letter-spacing="6">
    PRIX CARBURANTS · TEMPS RÉEL · DATA.GOUV
  </text>

  <circle cx="1050" cy="180" r="70" fill="none" stroke="#ff6b00" stroke-width="14"/>
  <circle cx="1120" cy="118" r="18" fill="#ffb800"/>
