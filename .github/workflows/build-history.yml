name: Refresh price history

on:
  schedule:
    - cron: '0 5 * * 1'   # chaque lundi à 05:00 UTC
  workflow_dispatch:       # bouton manuel

permissions:
  contents: write

concurrency:
  group: build-history
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate weekly history JSONs
        run: node scripts/build-history.mjs --weeks=12

      - name: Commit if changed
        run: |
          git config user.name  "octane-bot"
          git config user.email "octane-bot@users.noreply.github.com"
          git add data/history
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore(data): refresh weekly price history"
          git push
